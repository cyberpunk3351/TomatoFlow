services:
  db:
    image: postgres:15-alpine
    container_name: pomodoro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pomodoro
      POSTGRES_PASSWORD: pomodoro_password
      POSTGRES_DB: pomodoro_db
    ports:
      - "54321:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pomodoro -d pomodoro_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pomodoro_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      PORT: 3000
      DATABASE_URL: postgres://pomodoro:pomodoro_password@db:5432/pomodoro_db
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pomodoro_frontend
    restart: unless-stopped
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  pgdata:
